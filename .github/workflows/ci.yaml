name: Build xdg-desktop-portal-luminous (archlinux)

on: [push, pull_request]
jobs:
  build:
    name: "Build xdg-desktop-portal-luminous"
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
       - uses: actions/checkout@v7
       - name: "install deps"
         run: |
           pacman -Syu --noconfirm base-devel clang meson ninja pipewire libxkbcommon wayland cairo pango egl-wayland
       - uses: dtolnay/rust-toolchain@stable
         with:
           components: clippy rustfmt
       - name: Run fmt check
         run: cargo fmt --all -- --check
       - name: Run clippy
         run: cargo clippy -- -D warnings
       - name: build target
         run: |
           meson setup build
           meson compile -C build


  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create release
      id-token: write # required for OIDC token exchange
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1.11.0
        with:
          branch: master
          changelog: CHANGELOG.md
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish github release
        run: |
          if [[ $(echo "${GTIHUB_REF#refs/tags/v}" | grep '-' > /dev/null) ]]; then
            gh release edit "${GITHUB_REF#refs/tags/}" --prerelease
          fi
          gh release edit "${GITHUB_REF#refs/tags/}" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
